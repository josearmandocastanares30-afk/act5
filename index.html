<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 4 - Green & Black</title>
    <link rel="stylesheet" href="activity4v2.css">
</head>
<body>

    <h2>System Login</h2>

    <form action="" method="post">
        <table>
            <tr>
                <td><label for="fname">FIRST_NAME:</label></td>
                <td><input type="text" id="fname" name="firstname" required></td>
            </tr>

            <tr>
                <td><label for="lname">LAST_NAME:</label></td>
                <td><input type="text" id="lname" name="lastname" required></td>
            </tr>

            <tr>
                <td><label for="age">USER_AGE:</label></td>
                <td><input type="number" id="age" name="age"></td>
            </tr>

            <tr>
                <td><label>GENDER:</label></td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male" class="inner-label">Male</label><br>
                    
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female" class="inner-label">Female</label><br>
                    
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other" class="inner-label">Other</label>
                </td>
            </tr>

            <tr>
                <td><label>INTERESTS:</label></td>
                <td>
                    <input type="checkbox" id="hobby1" name="hobby" value="Movies">
                    <label for="hobby1" class="inner-label">Movies</label><br>
                    
                    <input type="checkbox" id="hobby2" name="hobby" value="Reading">
                    <label for="hobby2" class="inner-label">Reading</label><br>
                    
                    <input type="checkbox" id="hobby3" name="hobby" value="Gaming">
                    <label for="hobby3" class="inner-label">Gaming</label>
                </td>
            </tr>

            <tr>
                <td><label for="year-level">YEAR_LVL:</label></td>
                <td>
                    <select id="year-level" name="year_level">
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3">Year 3</option>
                        <option value="4">Year 4</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td></td> 
                <td>
                    <button type="submit">Execute</button>
                    <button type="reset">Abort</button>
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
